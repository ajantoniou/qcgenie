services:
  - type: web
    name: uploadcheck-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
  - type: web
    name: uploadcheck-api
    runtime: node
    buildCommand: python3 -m pip install -r requirements.txt && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOADCHECK_API_KEY
        sync: false
      - key: UPLOADCHECK_API_SCOPES
        value: jobs:write,jobs:read,reports:read,uploads:write,webhooks:write
      - key: UPLOADCHECK_STORE_PATH
        value: /tmp/uploadcheck/store.json
      # Set to a Render persistent disk mount before Product Hunt, for example:
      # /mnt/uploadcheck-data/store.json
      - key: UPLOADCHECK_SECRET_ENCRYPTION_KEY
        sync: false
      - key: UPLOADCHECK_INLINE_MEDIA_MAX_MB
        value: "128"
      - key: UPLOADCHECK_DEMO_CLIP_URL
        sync: false
      - key: UPLOADCHECK_DURABLE_STORAGE_DIR
        sync: false
