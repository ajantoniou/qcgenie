services:
  - type: web
    name: uploadcheck-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains:
      - uploadcheck.app
      - www.uploadcheck.app
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
  - type: web
    name: uploadcheck-api
    runtime: node
    buildCommand: python3 -m pip install -r requirements.txt && npm install && npm run build
    startCommand: npm start
    domains:
      - api.uploadcheck.app
    disk:
      name: uploadcheck-data
      mountPath: /mnt/uploadcheck
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: UPLOADCHECK_API_KEY_SHA256
        sync: false
      - key: UPLOADCHECK_CREATOR_CHECKOUT_URL
        sync: false
      - key: UPLOADCHECK_STUDIO_CHECKOUT_URL
        sync: false
      - key: UPLOADCHECK_NETWORK_CHECKOUT_URL
        sync: false
      - key: UPLOADCHECK_LEMONSQUEEZY_STORE_SLUG
        sync: false
      - key: UPLOADCHECK_CREATOR_VARIANT_ID
        sync: false
      - key: UPLOADCHECK_STUDIO_VARIANT_ID
        sync: false
      - key: UPLOADCHECK_NETWORK_VARIANT_ID
        sync: false
      - key: UPLOADCHECK_API_SCOPES
        value: jobs:write,jobs:read,reports:read,uploads:write,webhooks:write
      - key: UPLOADCHECK_STORE_PATH
        value: /mnt/uploadcheck/store.json
      - key: UPLOADCHECK_SECRET_ENCRYPTION_KEY
        sync: false
      - key: UPLOADCHECK_INLINE_MEDIA_MAX_MB
        value: "128"
      - key: UPLOADCHECK_DEMO_CLIP_URL
        sync: false
      - key: UPLOADCHECK_DURABLE_STORAGE_DIR
        value: /mnt/uploadcheck/uploads
